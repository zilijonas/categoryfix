name: Deploy Staging

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-staging.yml"
      - "apps/shop-admin/**"
      - "packages/**"
      - "scripts/smoke-staging.mjs"
      - "package.json"
      - "pnpm-lock.yaml"

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy staging app and worker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --config apps/shop-admin/fly.staging.toml --remote-only

  smoke:
    runs-on: ubuntu-latest
    environment: staging
    needs: deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run staging smoke checks
        env:
          SMOKE_APP_URL: ${{ vars.SMOKE_APP_URL }}
          SMOKE_PUBLIC_SITE_URL: ${{ vars.SMOKE_PUBLIC_SITE_URL }}
        run: pnpm test:smoke:staging
