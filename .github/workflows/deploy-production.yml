name: Deploy Production

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run release gate
        run: pnpm release:check

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy production app and worker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --config apps/shop-admin/fly.production.toml --remote-only

      - name: Run production smoke checks
        env:
          SMOKE_APP_URL: ${{ vars.SMOKE_APP_URL }}
          SMOKE_PUBLIC_SITE_URL: ${{ vars.SMOKE_PUBLIC_SITE_URL }}
        run: pnpm test:smoke:staging
